name: quiz-generator-ai-mcp
description: AI-powered quiz generator ai MCP server for agents. Supports generate
  quiz, validate answers, generate flashcards. By MEOK AI Labs.
version: 1.0.0
tools:
- name: generate_quiz
  description: Generate a quiz from provided content text.
  parameters:
  - name: content
    type: string
    required: true
  - name: num_questions
    type: integer
    required: false
  - name: question_type
    type: string
    required: false
- name: validate_answers
  description: Validate submitted answers against correct answers and return scoring.
  parameters:
  - name: questions
    type: array
    required: true
  - name: answers
    type: object
    required: true
- name: generate_flashcards
  description: Generate flashcards (front/back pairs) from content for study purposes.
  parameters:
  - name: content
    type: string
    required: true
  - name: num_cards
    type: integer
    required: false
- name: assess_difficulty
  description: Assess the difficulty level of content for quiz/study purposes.
  parameters:
  - name: content
    type: string
    required: true
  - name: target_audience
    type: string
    required: false
